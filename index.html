<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .wheel-box { position: relative; width: 260px; height: 260px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #333; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid cyan; z-index: 10; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .btn { background: #0088cc; border: none; padding: 12px; color: white; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        input { background: #2b2b2b; border: 1px solid #444; color: white; padding: 10px; width: 80%; border-radius: 10px; margin-bottom: 10px; }
        .bets-list { margin-top: 20px; text-align: left; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">Баланс: <span id="balance">0.00</span> TON</div>
    <div id="timer" style="font-size: 20px; color: gold; min-height: 24px;">Ожидание...</div>
    
    <div class="wheel-box">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div class="card">Банк: <span id="totalBank">0.00</span> TON</div>
    <input type="number" id="betInput" value="1.0" step="0.1" min="0.1">
    <button class="btn" onclick="sendBet()">Поставить</button>
    
    <div id="betsList" class="bets-list"></div>

    <script>
        const tg = window.Telegram.WebApp;
        // Замените URL на адрес вашего сервера
        const socket = io('https://your-server-address.com'); 
        
        let user = tg.initDataUnsafe.user || { id: Math.floor(Math.random()*1000), first_name: 'Guest' };

        socket.emit('join', user);

        socket.on('init_data', d => { 
            updateBal(d.user.balance); 
            draw(d.gameState.bets); 
        });

        socket.on('timer_tick', t => {
            document.getElementById("timer").innerText = 'До начала: ${t}';
        });

        socket.on('update_game', d => { 
            document.getElementById('totalBank').innerText = d.totalBank.toFixed(2);
            draw(d.bets);
            document.getElementById('betsList').innerHTML = d.bets.map(b => 
                <div style="color:${b.color}">● ${b.name}: ${b.amount} TON</div>
            ).join('');
        });

        socket.on('round_result', d => {
            document.getElementById("timer").innerText =  'Победил: ${d.winner.name}';
            const rotation = 3600 + (Math.random() * 360);
            document.getElementById('wheel').style.transform = 'rotate(${rotation}deg)';
        });

        socket.on('game_reset', () => {
            document.getElementById('timer').innerText = "Ожидание ставок...";
            document.getElementById('wheel').style.transition = 'none';
            document.getElementById('wheel').style.transform = 'rotate(0deg)';
            setTimeout(() => {
                document.getElementById('wheel').style.transition = 'transform 6s cubic-bezier(0.15, 0, 0.15, 1)';
            }, 50);
            draw([]);
            document.getElementById('betsList').innerHTML = '';
            document.getElementById('totalBank').innerText = '0.00';
        });

        socket.on('update_balance', b => updateBal(b));
        function updateBal(v) { 
            document.getElementById('balance').innerText = v.toFixed(2); 
        }

        function sendBet() { 
            const amount = document.getElementById('betInput').value;
            socket.emit('place_bet', { userId: user.id, amount }); 
        }

        function draw(bets) {
            const canvas = document.getElementById('wheel');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 500, 500);
            
            if(!bets.length) { 
                ctx.beginPath(); ctx.fillStyle='#333'; ctx.arc(250,250,240,0,Math.PI*2); ctx.fill(); 
                return; 
            }

            let start = 0;
            const total = bets.reduce((a,b) => a + b.amount, 0);
            
            bets.forEach(b => {
                let angle = (b.amount / total) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.fillStyle = b.color;
                ctx.arc(250, 250, 245, start, start + angle);
                ctx.fill();
                start += angle;
            });
        }
    </script>
</body>
</html>
