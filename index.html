<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рулетка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        #wheel {
            width: 300px;
            height: 300px;
            border: 16px solid #333;
            border-radius: 50%;
            position: relative;
            margin: 20px auto;
            overflow: hidden;
        }
        .slot {
            position: absolute;
            width: 50%;
            height: 50%;
            background-color: red;
            transform-origin: 100% 100%;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Рулетка</h1>
<div id="wheel">
    <div class="slot" style="transform: rotate(0deg);">0</div>
    <div class="slot" style="transform: rotate(30deg);">1</div>
    <div class="slot" style="transform: rotate(60deg);">2</div>
    <div class="slot" style="transform: rotate(90deg);">3</div>
    <div class="slot" style="transform: rotate(120deg);">4</div>
    <div class="slot" style="transform: rotate(150deg);">5</div>
    <div class="slot" style="transform: rotate(180deg);">6</div>
    <div class="slot" style="transform: rotate(210deg);">7</div>
    <div class="slot" style="transform: rotate(240deg);">8</div>
    <div class="slot" style="transform: rotate(270deg);">9</div>
    <div class="slot" style="transform: rotate(300deg);">10</div>
    <div class="slot" style="transform: rotate(330deg);">11</div>
</div>

<button onclick="spinWheel()">Крутить!</button>

<script>
    function spinWheel() {
        const wheel = document.getElementById('wheel');
        const randomDegree = Math.floor(Math.random() * 360) + 720; // минимум два полных оборота
        wheel.style.transition = 'transform 4s ease-out';
        wheel.style.transform = 'rotate(${randomDegree}deg)'; // Исправлено на использование обратных кавычек
    }
</script>

</body>
</html>
