<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvP Рулетка</title>
    <link rel="stylesheet" href="styles.css"> <!-- Подключите ваш CSS файл, если он есть -->
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="app">
        <h1>🎰 PvP Рулетка</h1>
        <div id="balance">Ваш баланс: 1000 TON</div>
        <div id="bets">
            <h2>Ставки</h2>
            <ul id="betList"></ul>
        </div>
        <div id="timer">Время до розыгрыша: 30</div>
        <input type="number" id="betAmount" placeholder="Введите сумму ставки" />
        <button id="placeBet">Сделать ставку</button>
        <div id="winner"></div>
        <div id="onlineCount">Онлайн: 0</div>
    </div>

    <script>
        const socket = io();
        let playerId = Math.random().toString(36).substr(2, 9); // Генерация уникального ID игрока

        socket.emit('initPlayer', { id: playerId });

        socket.on('updateBalance', (balance) => {
            document.getElementById('balance').innerText = 'Ваш баланс: ${balance} TON';
        });

        socket.on('newBet', ({ bets, totalBank }) => {
            const betList = document.getElementById('betList');
            betList.innerHTML = '';
            bets.forEach(bet => {
                const li = document.createElement('li');
                li.innerText = '${bet.name} ставит ${bet.amount} TON';
                li.style.color = bet.color;
                betList.appendChild(li);
            });
            document.getElementById('timer').innerText = 'Время до розыгрыша: ${totalBank}';
        });

        socket.on('timerUpdate', ({ timer }) => {
            document.getElementById('timer').innerText = 'Время до розыгрыша: ${timer}';
        });

        socket.on('winnerInfo', ({ winner, totalBank }) => {
            document.getElementById('winner').innerText = 'Победитель: ${winner.name}, выигрыш: ${totalBank} TON';
        });

        socket.on('onlineUpdate', (count) => {
            document.getElementById('onlineCount').innerText = 'Онлайн: ${count}';
        });

        document.getElementById('placeBet').addEventListener('click', () => {
            const amount = parseFloat(document.getElementById('betAmount').value);
            if (!isNaN(amount) && amount > 0) {
                socket.emit('placeBet', '{ id: playerId, name: Игрок ${playerId}, amount }');
                document.getElementById('betAmount').value = ''; // Очистить поле ввода
            }
        });
    </script>
</body>
</html>
