<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра на колесе</title>
    <style>
        /* Стили для колеса и интерфейса */
        #wheel {
            width: 300px;
            height: 300px;
            border: 10px solid #000;
            border-radius: 50%;
            position: relative;
            margin: 20px auto;
            transition: background 0.5s;
        }
        #bet-list {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Игра на колесе</h1>
    <div id="wheel"></div>
    
    <input type="number" id="amount" placeholder="Введите сумму ставки" />
    <button onclick="bet()">Сделать ставку</button>

    <div id="bet-list"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('newBet', (data) => {
            const list = document.getElementById('bet-list');
            const betItem = document.createElement('div');
            betItem.innerText = '${data.player}: ${data.amount} TON'; // Использование шаблонных строк
            list.appendChild(betItem);

            // Обновление колеса или других элементов UI в зависимости от ставок
            const wheel = document.getElementById('wheel');
            wheel.style.background = "#4CAF50"; // Измените цвет колеса для примера
        });
        
        function bet() {
            const amountInput = document.getElementById('amount');
            const amount = parseFloat(amountInput.value);
            if (isNaN(amount) || amount <= 0) {
                alert('Введите корректную сумму.');
                return;
            }

            socket.emit('placeBet', { player: 'Игрок', amount: amount }); // Замените 'Игрок' на актуальное имя игрока
            amountInput.value = ''; // Очистка поля ввода
        }
    </script>
</body>
</html>
