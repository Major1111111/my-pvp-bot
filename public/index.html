<!DOCTYPE html>
<html>
<head>
    <title>Online Jackpot</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        canvas { border: 5px solid #333; border-radius: 50%; margin-top: 20px; }
        #ui { margin-top: 20px; }
        .timer { font-size: 40px; color: #00ff96; }
    </style>
</head>
<body>

    <div class="timer" id="timer">60</div>
    <canvas id="wheel" width="400" height="400"></canvas>

    <div id="ui">
        <input type="text" id="name" placeholder="Имя">
        <input type="number" id="amount" placeholder="Ставка">
        <button onclick="sendBet()">Ставка!</button>
    </div>

    <div id="playersList"></div>

    <script>
        const socket = io();
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        let players = [];

        // Получаем время от сервера
        socket.on('timerUpdate', (time) => {
            document.getElementById('timer').innerText = time;
        });

        // Получаем начальные данные
        socket.on('init', (data) => {
            players = data.players;
            drawWheel(0);
        });

        // Новая ставка от любого игрока
        socket.on('newBet', (bet) => {
            players.push(bet);
            drawWheel(0);
        });

        // Команда на вращение
        socket.on('startSpin', (seed) => {
            animateWheel(seed);
        });

        socket.on('resetGame', () => {
            players = [];
            drawWheel(0);
        });
        function sendBet() {
            const name = document.getElementById('name').value;
            const amount = parseInt(document.getElementById('amount').value);
            const color = '#' + Math.floor(Math.random()*16777215).toString(16);
            if(name && amount) {
                socket.emit('makeBet', { name, amount, color });
            }
        }

        function drawWheel(angle) {
            const total = players.reduce((s, p) => s + p.amount, 0);
            ctx.clearRect(0,0,400,400);
            if(players.length === 0) {
                ctx.beginPath(); ctx.fillStyle = '#333';
                ctx.arc(200,200,190,0,Math.PI*2); ctx.fill();
                return;
            }
            let start = angle;
            players.forEach(p => {
                const slice = (p.amount / total) * Math.PI * 2;
                ctx.beginPath(); ctx.fillStyle = p.color;
                ctx.moveTo(200,200);
                ctx.arc(200,200,190,start, start + slice);
                ctx.fill();
                start += slice;
            });
        }

        function animateWheel(seed) {
            let start = null;
            const duration = 5000;
            const totalRotation = (10 + seed * 10) * Math.PI * 2;

            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                drawWheel(ease * totalRotation);
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }
    </script>
</body>
</html>
