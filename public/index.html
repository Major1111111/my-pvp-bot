<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molls Jackpot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-main: #0b0b0b;
            --bg-card: #1c1c1e;
            --ton-blue: #2481cc;
            --text-grey: #8e8e93;
            --win-green: #34c759;
        }

        body {
            background: var(--bg-main);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* Обновленный Хедер */
        .header-top { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-top: 10px;
            margin-bottom: 5px; 
        }
        .p-count { 
            font-size: 20px; 
            font-weight: 800; 
            letter-spacing: 0.5px;
        }

        /* Таймер */
        .timer-val { 
            font-size: 42px; 
            font-weight: 900; 
            text-align: center; 
            margin-bottom: 20px; 
            color: white;
        }

        /* Колесо */
        #wheel-wrapper { position: relative; width: 260px; height: 260px; margin: 0 auto 30px; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #2c2c2e; }
        #pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 18px solid #ff3b30; z-index: 10; 
        }

        /* Карточка игрока */
        .player-item {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        .item-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-user { display: flex; align-items: center; gap: 12px; }
        .item-user img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .item-user .nick { font-weight: bold; font-size: 16px; display: block; }
        .item-user .role { color: var(--text-grey); font-size: 13px; }
        .item-stats { text-align: right; }
        .item-stats .perc { font-weight: bold; font-size: 16px; }
        .item-stats .sum { color: var(--text-grey); font-size: 13px; margin-top: 4px; }
        .item-bet-badge {
            background: var(--ton-blue);
            width: fit-content;
            padding: 6px 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* НОВАЯ КНОПКА (КАК НА ФОТО 2) */
        .footer-bet-btn {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            z-index: 100;
        }
        #make-bet-btn {
            background: white; 
            color: black;
            width: 100%; 
            padding: 18px;
            border-radius: 18px; 
            border: none;
            font-size: 17px; 
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
            transition: transform 0.1s;
        }
        #make-bet-btn:active { transform: scale(0.98); }
        /* Экран победителя */
        #winner-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; padding: 20px; box-sizing: border-box; flex-direction: column;
        }
        .win-header { display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 30px; }
        .close-x { position: absolute; right: 0; background: #333; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .win-title { font-size: 28px; font-weight: 800; margin-bottom: 25px; }
        .win-user-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .win-user-row img { width: 40px; height: 40px; border-radius: 50%; }
        .win-amount { color: var(--win-green); font-weight: bold; }
        .win-card-visual {
            background: #1c1c1e; border-radius: 20px; height: 200px; width: 130px;
            margin: 0 auto 40px; display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
        }
        .ton-circle { background: var(--ton-blue); width: 70px; height: 70px; border-radius: 50%; margin: 30px auto 0; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .footer-sum { font-size: 14px; font-weight: bold; text-align: center; border-top: 1px solid #333; padding-top: 10px; }
        .btn-done { background: white; color: black; width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 18px; font-weight: bold; margin-top: auto; }

        /* Модалка */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 10000; align-items:center; justify-content:center; }
        .modal-body { background: var(--bg-card); padding: 25px; border-radius: 20px; width: 85%; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 18px; text-align: center; margin: 15px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- Заменили undefined на PvP рулетка -->
    <div class="header-top">
        <div class="p-count">PvP рулетка</div>
    </div>

    <!-- Исправили отображение таймера -->
    <div class="timer-val" id="timer">--</div>

    <div id="wheel-wrapper">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div id="player-list"></div>

    <!-- Белая кнопка как на фото -->
    <div class="footer-bet-btn">
        <button id="make-bet-btn" onclick="openModal()">Сделать ставку</button>
    </div>

    <div id="winner-overlay">
        <div class="win-header">
            <div style="color: #8e8e93; font-weight: bold;">Игра #<span id="win-game-id">0</span></div>
            <div class="close-x" onclick="closeWinner()">✕</div>
        </div>
        <div class="win-title">Поздравляем! Ты<br>победил!</div>
        <div class="win-user-row">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="win-u-img" src="">
                <div>
                    <span id="win-u-nick" style="font-weight:bold;"></span><br>
                    <span class="u-you" style="color:var(--win-green); font-size:13px;">Ты</span>
                </div>
            </div>
            <div style="text-align:right;">
                <div class="win-amount">Выиграл <span id="win-u-sum">0</span> TON</div>
                <div id="win-u-perc" style="color:#8e8e93; font-size:14px;">0%</div>
            </div>
        </div>
        <div class="win-card-visual">
            <div class="ton-circle">💎</div>
            <div class="footer-sum">💎 <span id="win-card-sum">0</span> TON</div>
        </div>
        <button class="btn-done" onclick="closeWinner()">Готово</button>
    </div>
    <div id="modal">
        <div class="modal-body">
            <h3 style="margin:0; text-align:center;">Сумма ставки</h3>
            <input type="number" id="bet-amount" placeholder="0.1" step="0.1">
            <button onclick="confirmBet()" style="background:var(--win-green); width:100%; padding:16px; border-radius:12px; border:none; color:white; font-weight:bold; font-size:16px;">ПОСТАВИТЬ</button>
            <button onclick="closeModal()" style="background:none; color:#8e8e93; border:none; margin-top:15px; width:100%; font-size:14px;">Отмена</button>
        </div>
    </div>

    <script>
        const socket = io();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user || { 
            username: "User", 
            photo_url: "https://via.placeholder.com/100",
            id: Date.now()
        };

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        let players = [];
        let images = {};
        let currentGameId = 0;

        socket.on('timerUpdate', (data) => {
            // Теперь здесь обновляем только цифры, текст "PvP рулетка" остается
            document.getElementById('timer').innerText = data.timeLeft;
            currentGameId = data.gameId;
        });

        socket.on('init', (data) => { players = data.players; updateUI(); });
        socket.on('updatePlayers', (p) => { players = p; updateUI(); });

        socket.on('startSpin', (data) => {
            document.getElementById('make-bet-btn').disabled = true;
            document.getElementById('make-bet-btn').style.opacity = "0.5";
            animateWheel(data.seed, data.winner, data.bank);
        });

        socket.on('resetGame', () => {
            players = [];
            document.getElementById('make-bet-btn').disabled = false;
            document.getElementById('make-bet-btn').style.opacity = "1";
            updateUI();
        });

        function updateUI() {
            const list = document.getElementById('player-list');
            const total = players.reduce((s, p) => s + p.amount, 0);
            
            list.innerHTML = players.map(p => `
                <div class="player-item">
                    <div class="item-top">
                        <div class="item-user">
                            <img src="${p.photo}">
                            <div class="names">
                                <span class="nick">@${p.username}</span>
                                <span class="role">${p.username === user.username ? 'Ты' : 'Игрок'}</span>
                            </div>
                        </div>
                        <div class="item-stats">
                            <div class="perc">${total > 0 ? ((p.amount/total)*100).toFixed(1) : 0}%</div>
                            <div class="sum">${p.amount.toFixed(1)} TON</div>
                        </div>
                    </div>
                    <div class="item-bet-badge"><span>💎</span> ${p.amount.toFixed(1)}</div>
                </div>
            `).join('');

            players.forEach(p => {
                if(!images[p.photo]) {
                    const img = new Image(); img.src = p.photo;
                    img.onload = () => drawWheel(0);
                    images[p.photo] = img;
                }
            });
            drawWheel(0);
        }
        function drawWheel(rotation) {
            const total = players.reduce((s, p) => s + p.amount, 0);
            const centerX = 250, centerY = 250, radius = 240;
            ctx.clearRect(0,0,500,500);
            if(players.length === 0) {
                ctx.beginPath(); ctx.fillStyle = '#1c1c1e';
                ctx.arc(centerX, centerY, radius, 0, Math.PI*2); ctx.fill();
                return;
            }
            let startAngle = rotation - Math.PI/2;
            players.forEach(p => {
                const slice = (p.amount / total) * Math.PI * 2;
                ctx.beginPath(); ctx.fillStyle = p.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + slice);
                ctx.fill();
                if (images[p.photo]) {
                    ctx.save(); ctx.translate(centerX, centerY);
                    ctx.rotate(startAngle + slice/2);
                    ctx.beginPath(); ctx.arc(radius*0.75, 0, 25, 0, Math.PI*2); ctx.clip();
                    ctx.drawImage(images[p.photo], radius*0.75-25, -25, 50, 50);
                    ctx.restore();
                }
                startAngle += slice;
            });
        }

        function animateWheel(seed, winner, bank) {
            let start = null;
            const duration = 6000;
            const totalRotation = (10 + seed) * Math.PI * 2;
            function step(ts) {
                if (!start) start = ts;
                const progress = Math.min((ts - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                drawWheel(ease * totalRotation);
                if (progress < 1) requestAnimationFrame(step);
                else showWinnerUI(winner, bank);
            }
            requestAnimationFrame(step);
        }

        function showWinnerUI(winner, bank) {
    // 1. Считаем общую сумму (исправлено)
    const total = players.reduce((s, p) => s + p.amount, 0);
    
    // 2. Обновляем базовые поля UI
    document.getElementById("win-gam-id").innerText = currentGameId;
    document.getElementById("win-u-img").src = winner.photo;
    document.getElementById("win-u-nick").innerText = winner.username;
    document.getElementById("win-sum-val").innerText = bank.toFixed(2);
    document.getElementById("win-u-sum").innerText = bank.toFixed(2);
    
    // 3. Безопасный расчет процента (исправлена ошибка на строке 307)
    const winPercentage = total > 0 ? ((winner.amount / total) * 100).toFixed(2) : "0.00";
    document.getElementById("win-u-perc").innerText = winPercentage + "%";

    // 4. Логика заголовка (Ты выиграл или Кто-то другой)
    const title = document.querySelector(".win-title");
    if (winner.username === user.username) {
        title.innerText = "Поздравляем! Вы выиграли!";
        document.querySelector(".u-you").style.display = "block";
    } else {
        title.innerText = "Игра окончена! Победитель найден.";
        document.querySelector(".u-you").style.display = "none";
    }
}
            document.getElementById('winner-overlay').style.display = 'flex';
    

        function closeWinner() { document.getElementById('winner-overlay').style.display = 'none'; }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function confirmBet() {
            const amount = parseFloat(document.getElementById('bet-amount').value);
            if (amount >= 0.1) {
                socket.emit('makeBet', {
                    username: user.username,
                    photo: user.photo_url || "https://via.placeholder.com/100",
                    amount: amount,
                    color: '#' + Math.floor(Math.random()*16777215).toString(16)
                });
                closeModal();
            } else {
                alert("Минимальная ставка 0.1 TON");
            }
        }
    </script>
</body>
</html>
