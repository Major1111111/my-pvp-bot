<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molls Jackpot</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow: hidden;
        }

        /* Таймер сверху */
        .timer { font-size: 48px; font-weight: bold; color: #ffffff; margin-top: 20px; }

        /* Контейнер рулетки */
        #wheel-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 20px;
            width: 90vw;
            max-width: 400px;
        }

        #pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff4d4d; /* Красная стрелка как на фото */
            z-index: 10;
        }

        canvas { 
            width: 100%; 
            height: auto; 
            border: 8px solid #2a2a2a; 
            border-radius: 50%; 
            background: #1e1e1e;
        }

        /* Нижняя панель управления */
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e1e1e;
            padding: 20px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .balance-label {
            color: #ffcc00; /* Желтый цвет как на фото */
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: left;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: white;
            color: black;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #00c853; /* Зеленая кнопка */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled { background: #444; }
    </style>
</head>
<body>

    <div class="timer" id="timer">30</div>

    <div id="wheel-wrapper">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div id="controls">
        <div class="balance-label">Ваш баланс: <span id="balance">100.00</span> TON</div>
        <div class="input-row">
            <input type="text" id="name" placeholder="Имя">
            <input type="number" id="amount" placeholder="Ставка">
        </div>
        <button id="betBtn" onclick="sendBet()">Сделать ставку</button>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        
        let players = [];
        let myBalance = 100.00; // Баланс в TON

        function updateUI() {
            document.getElementById('balance').innerText = myBalance.toFixed(2);
        }

        socket.on('timerUpdate', (t) => { document.getElementById('timer').innerText = t; });

        socket.on('init', (data) => {
            players = data.players;
            drawWheel(0);
        });

        socket.on('newBet', (bet) => {
            players.push(bet);
            drawWheel(0);
        });

        socket.on('startSpin', (seed) => {
            document.getElementById('betBtn').disabled = true;
            animateWheel(seed);
        });

        socket.on('resetGame', () => {
            players = [];
            document.getElementById('betBtn').disabled = false;
            drawWheel(0);
        });

        function sendBet() {
            const name = document.getElementById('name').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const color = '#' + Math.floor(Math.random()*16777215).toString(16);

            if (!name || isNaN(amount) || amount <= 0) return alert("Заполните данные");
            if (amount > myBalance) return alert("Мало TON на балансе!");

            myBalance -= amount;
            updateUI();
            socket.emit('makeBet', { name, amount, color });
        }

        function drawWheel(rotation) {
            const total = players.reduce((s, p) => s + p.amount, 0);
            const centerX = 250;
            const centerY = 250;
            const radius = 240;

            ctx.clearRect(0,0,500,500);

            if(players.length === 0) {
                ctx.beginPath();
                ctx.fillStyle = '#2a2a2a';
                ctx.arc(centerX, centerY, radius, 0, Math.PI*2);
                ctx.fill();
                return;
            }

            let startAngle = rotation - Math.PI/2;

            players.forEach(p => {
                const sliceAngle = (p.amount / total) * Math.PI * 2;
                
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                ctx.fill();
                // Буква имени
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 40px sans-serif";
                ctx.fillText(p.name.charAt(0).toUpperCase(), radius - 30, 15);
                ctx.restore();

                startAngle += sliceAngle;
            });
        }

        function animateWheel(seed) {
            let start = null;
            const duration = 8000;
            const finalRotation = (15 + seed * 10) * Math.PI * 2;

            function step(ts) {
                if (!start) start = ts;
                const progress = Math.min((ts - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                drawWheel(ease * finalRotation);
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        updateUI();
    </script>
</body>
</html>
