<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Wheel - Molls</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем библиотеки корректно -->
    <script src="https://socket.io"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- Верхняя панель -->
    <div class="header-container">
        <div class="header-icon">🕒</div>
        <div class="total-bank-badge">
            ВСЕГО <span id="total-bank-amount">0.00</span> TON
        </div>
        <div class="header-icon">💬</div>
    </div>

    <!-- Баланс -->
    <div class="balance-widget-container">
        <div class="balance-item blue-circle">💎</div>
        <span id="user-balance" class="balance-amount">0.00</span>
        <div class="balance-item white-circle">+</div>
    </div>

    <div class="game-container">
        <div class="wheel-section">
            <div class="pointer-triangle"></div>
            <canvas id="wheel" width="500" height="500"></canvas>
            
            <div class="center-timer-circle">
                <div id="timer" class="timer-text">00:00</div>
                <svg class="timer-progress">
                    <circle cx="75" cy="75" r="70"></circle>
                </svg>
            </div>
        </div>

        <div class="players-section">
            <div id="player-list" class="player-list"></div>
        </div>

        <button id="make-bet-btn" class="make-bet-button">Сделать ставку</button>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-button" id="close-bet-modal-btn">&times;</span>
            <h2>Сделать ставку</h2>
            <input type="number" id="bet-amount" placeholder="Введите сумму" value="0.1" step="0.1">
            <button id="confirm-bet-btn">Подтвердить</button>
        </div>
    </div>

    <!-- Победитель -->
    <div id="winner-overlay" class="winner-overlay" style="display:none;">
        <div class="winner-card">
            <h2 class="win-title">Победа!</h2>
            <div class="winner-info">
                <img id="win-u-img" src="" alt="">
                <span id="win-u-nick" class="winner-nick"></span>
            </div>
            <div class="win-card-amount"><span id="win-card-sum">0.00</span> TON</div>
            <button id="winner-done-btn" class="winner-done-button">Закрыть</button>
        </div>
    </div>

    <!-- Подключаем логику -->
    <script src="app.js"></script>
</body>
</html>
