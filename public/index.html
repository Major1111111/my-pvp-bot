<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Molls App</title>
    <!-- Скрипт Телеграм -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* Кнопка Онлайн */
        #online-badge {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.1); padding: 5px 12px;
            border-radius: 20px; font-size: 14px; color: #00ff96;
        }

        .timer { font-size: 50px; font-weight: bold; margin-top: 30px; }
        
        #wheel-wrapper { position: relative; display: inline-block; margin: 20px 0; }
        #pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 25px solid #ff4d4d; z-index: 10;
        }
        canvas { border-radius: 50%; border: 8px solid #252525; max-width: 90vw; }
        /* Список игроков */
        #player-list {
            margin: 20px auto; width: 90%; background: #1e1e1e;
            border-radius: 15px; padding: 10px; text-align: left;
        }
        .player-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px; border-bottom: 1px solid #333;
        }
        .player-item img { width: 30px; height: 30px; border-radius: 50%; margin-right: 10px; }

        /* Кнопка добавить ставку */
        #add-bet-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #00c853; color: white; padding: 15px 40px;
            border-radius: 30px; font-weight: bold; border: none; font-size: 18px; width: 80%;
        }

        /* Модальное окно */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-content { background: #252525; padding: 30px; border-radius: 20px; width: 80%; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; font-size: 18px; }

        .winner-announcement { color: #ffd700; font-size: 20px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="online-badge">Онлайн: <span id="online-count">1</span></div>
    <div class="timer" id="timer">30</div>
    <div id="winner-text" class="winner-announcement"></div>

    <div id="wheel-wrapper">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div id="player-list"></div>

    <button id="add-bet-btn" onclick="openModal()">ДОБАВИТЬ СТАВКУ</button>

    <div id="modal">
        <div class="modal-content">
            <h3>Ваша ставка (TON)</h3>
            <input type="number" id="bet-amount" placeholder="0.1" step="0.1">
            <button onclick="confirmBet()" style="background:#00c853; width:100%; padding:10px; border-radius:10px; border:none; color:white; font-weight:bold;">ПОДТВЕРДИТЬ</button>
            <button onclick="closeModal()" style="background:none; color:gray; border:none; margin-top:10px;">Отмена</button>
        </div>
    </div>

    <script>
        const socket = io();
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные пользователя (План Б включен здесь)
        const user = tg.initDataUnsafe?.user || { 
            id: 123, 
            first_name: "Guest", 
            username: "guest_user",
            photo_url: "https://via.placeholder.com/100" 
        };

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        let players = [];
        let images = {}; // Кэш для аватарок

        socket.on('onlineUpdate', (count) => { document.getElementById('online-count').innerText = count; });
        socket.on('timerUpdate', (t) => { document.getElementById('timer').innerText = t; });
        
        socket.on('init', (data) => { players = data.players; updateGame(); });
        socket.on('newBet', (bet) => { players.push(bet); updateGame(); });

        socket.on('startSpin', (data) => {
            document.getElementById('add-bet-btn').disabled = true;
            animateWheel(data.seed, data.winner, data.bank);
        });

        socket.on('resetGame', () => {
            players = [];
            document.getElementById('add-bet-btn').disabled = false;
            document.getElementById('winner-text').innerText = "";
            updateGame();
        });

        function updateGame() {
            renderPlayerList();
            preloadImages();
            drawWheel(0);
        }
        function renderPlayerList() {
            const list = document.getElementById('player-list');
            const total = players.reduce((s, p) => s + p.amount, 0);
            list.innerHTML = players.map(p => `
                <div class="player-item">
                    <div style="display:flex; align-items:center;">
                        <img src="${p.photo}">
                        <span>@${p.username}</span>
                    </div>
                    <div><b>p.amount TON</b> <span style="color:#888; font-size:12px;">({(p.amount/total*100).toFixed(1)}%)</span></div>
                </div>
            `).join('');
        }

        function preloadImages() {
            players.forEach(p => {
                if (!images[p.photo]) {
                    const img = new Image();
                    img.src = p.photo;
                    img.onload = () => drawWheel(0);
                    images[p.photo] = img;
                }
            });
        }

        function drawWheel(rotation) {
            const total = players.reduce((s, p) => s + p.amount, 0);
            const centerX = 250, centerY = 250, radius = 240;
            ctx.clearRect(0,0,500,500);

            if(players.length === 0) {
                ctx.beginPath(); ctx.fillStyle = '#252525';
                ctx.arc(centerX, centerY, radius, 0, Math.PI*2); ctx.fill();
                return;
            }

            let startAngle = rotation - Math.PI/2;
            players.forEach(p => {
                const slice = (p.amount / total) * Math.PI * 2;
                ctx.beginPath(); ctx.fillStyle = p.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + slice);
                ctx.fill();

                // Отрисовка аватарки
                if (images[p.photo]) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(startAngle + slice / 2);
                    
                    // Круглая маска для аватарки
                    ctx.beginPath();
                    ctx.arc(radius * 0.7, 0, 25, 0, Math.PI*2);
                    ctx.clip();
                    ctx.drawImage(images[p.photo], radius * 0.7 - 25, -25, 50, 50);
                    ctx.restore();
                }
                startAngle += slice;
            });
        }

        function animateWheel(seed, winner, bank) {
            let start = null;
            const duration = 9000;
            const totalRotation = (20 + seed) * Math.PI * 2;

            function step(ts) {
                if (!start) start = ts;
                const progress = Math.min((ts - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                drawWheel(ease * totalRotation);
                if (progress < 1) requestAnimationFrame(step);
                else {
                    document.getElementById('winner-text').innerText = 'Победил @${winner.username}! Выигрыш: ${bank} TON';
                }
            }
            requestAnimationFrame(step);
        }

        // Функции модалки
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function confirmBet() {
            const amount = parseFloat(document.getElementById('bet-amount').value);
            if (isNaN(amount) || amount <= 0) return alert("Введите сумму");
            
            socket.emit('makeBet', {
                username: user.username || user.first_name,
                photo: user.photo_url,
                amount: amount,
                color: '#' + Math.floor(Math.random()*16777215).toString(16)
            });
            closeModal();
        }
    </script>
</body>
</html>
