<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Wheel</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="header-container">
        <div class="header-icon">🕒</div>
        <div class="total-bank-badge">
            ВСЕГО <span id="total-bank-amount">0.00</span> TON
        </div>
        <div class="header-icon">💬</div>
    </div>
    <div class="game-container">
        <div class="wheel-section">
            <div class="pointer-triangle"></div>
            <canvas id="wheel" width="500" height="500"></canvas>
            <div class="center-timer-circle">
                <div id="timer" class="timer-text">00:30</div>
            </div>
        </div>

        <div id="player-list" class="player-list"></div>

        <button id="make-bet-btn" class="make-bet-button">Сделать ставку</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
